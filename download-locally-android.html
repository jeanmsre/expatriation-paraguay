<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Télécharger Locally pour Android</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #0d0d0d 0%, #1a1a2e 100%);
      min-height: 100vh;
      color: #e4e4e4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #00d4aa 0%, #00a884 100%);
      border-radius: 18px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .sub {
      color: #9ca3af;
      font-size: 0.95rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .btn-download {
      display: inline-block;
      background: linear-gradient(135deg, #00d4aa 0%, #00a884 100%);
      color: #0d0d0d;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 16px 32px;
      border-radius: 14px;
      text-decoration: none;
      margin-bottom: 12px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(0,212,170,0.35);
    }
    .btn-download:hover, .btn-download:active {
      transform: scale(1.02);
      box-shadow: 0 6px 24px rgba(0,212,170,0.45);
    }
    .hint {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 24px;
      line-height: 1.5;
    }
    .hint a { color: #00d4aa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📱</div>
    <h1>Locally</h1>
    <p class="sub">IA 100 % locale sur ton Android. Chat, photos, vocal — rien ne part sur internet.</p>
    <a id="download-btn" href="downloads/locally-android.apk" class="btn-download" download="Locally-android.apk">
      Télécharger l’APK pour Android
    </a>
    <p class="hint">
      Ouvre cette page sur ton téléphone Android et appuie sur le bouton pour installer.<br>
      Si l’APK n’est pas encore disponible, <a href="downloads/README-DOWNLOAD.md">voici comment le générer</a>.
    </p>
  </div>
</body>
</html>
